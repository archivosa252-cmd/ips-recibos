<!DOCTYPE html>
<html>
<head>
    <title>Recibo a Satisfacción - IPS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: Arial; padding:20px; }
        input, button { width:100%; padding:10px; margin:8px 0; }
        canvas { border:1px solid #000; }
    </style>
</head>
<body>

<h2>FORMATO DE RECIBO A SATISFACCIÓN</h2>

<form action="/generar" method="post">

    <label>Nombre del Usuario:</label>
    <input type="text" name="nombre" required>

    <label>Documento:</label>
    <input type="text" name="documento" required>

    <label>Servicio recibido:</label>
    <input type="text" name="servicio" required>

    <label>Modalidad:</label>
    <input type="radio" name="modalidad" value="Domicilio" required> Domicilio
    <input type="radio" name="modalidad" value="Recibido en IPS"> Recibido en la IPS

    <h3>Firma del Usuario:</h3>
    <canvas id="firma" width="300" height="150"></canvas>
    <br>
    <button type="button" onclick="limpiar()">Limpiar Firma</button>

    <input type="hidden" name="firma_base64" id="firma_base64">

    <button type="submit" onclick="guardarFirma()">Generar Recibo</button>
</form>

<script>
let canvas = document.getElementById("firma");
let ctx = canvas.getContext("2d");
let dibujando = false;

canvas.addEventListener("mousedown", () => dibujando = true);
canvas.addEventListener("mouseup", () => dibujando = false);
canvas.addEventListener("mousemove", dibujar);

canvas.addEventListener("touchstart", () => dibujando = true);
canvas.addEventListener("touchend", () => dibujando = false);
canvas.addEventListener("touchmove", dibujarTouch);

function dibujar(e){
    if(!dibujando) return;
    ctx.lineWidth = 2;
    ctx.lineCap = "round";
    ctx.strokeStyle = "black";
    ctx.lineTo(e.offsetX, e.offsetY);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(e.offsetX, e.offsetY);
}

function dibujarTouch(e){
    e.preventDefault();
    if(!dibujando) return;
    let rect = canvas.getBoundingClientRect();
    let touch = e.touches[0];
    let x = touch.clientX - rect.left;
    let y = touch.clientY - rect.top;

    ctx.lineWidth = 2;
    ctx.lineCap = "round";
    ctx.strokeStyle = "black";
    ctx.lineTo(x, y);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x, y);
}

function limpiar(){
    ctx.clearRect(0, 0, canvas.width, canvas.height);
}

function guardarFirma(){
    document.getElementById("firma_base64").value = canvas.toDataURL();
}
</script>

</body>
</html>
